<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel OneState - EL MACHO TECH</title>
    <style>
        :root { --gold: #f1c40f; --dark: #0a0a0a; --glass: rgba(15, 15, 15, 0.95); --red: #ff4d4d; --blue: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; padding: 20px; display: flex; justify-content: center; }
        
        /* TELA DE LOGIN */
        #login-screen { background: var(--glass); padding: 40px; border-radius: 20px; text-align: center; border: 1px solid var(--gold); width: 350px; margin-top: 10vh; box-shadow: 0 0 30px rgba(241, 196, 15, 0.2); }
        #login-screen input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #111; color: white; margin-bottom: 20px; box-sizing: border-box; }

        /* PAINEL PRINCIPAL */
        #main-app { display: none; width: 100%; max-width: 1000px; }
        .container { background: var(--glass); padding: 30px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); padding-bottom: 15px; margin-bottom: 25px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .card { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 15px; border: 1px solid #222; position: relative; }
        .card h3 { margin-top: 0; color: var(--gold); font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        
        .stats { font-size: 38px; font-weight: bold; margin: 10px 0; color: #fff; }
        .stats span { color: var(--gold); }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }

        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; margin-top: 5px; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-red { background: var(--red); color: #fff; }
        .btn-blue { background: var(--blue); color: #fff; }
        .btn:hover { filter: brightness(1.2); transform: translateY(-2px); }

        .log-box { margin-top: 25px; background: #000; border: 1px solid #222; border-radius: 10px; padding: 15px; height: 200px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px; }
        .log-entry { border-bottom: 1px solid #111; padding: 5px 0; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="color:var(--gold); margin:0;">EL MACHO</h1>
        <p style="color:#666; font-size: 12px; margin-bottom: 25px;">CONTROL PANEL v2.0</p>
        <input type="text" id="user-login" placeholder="NOME DO ADM (EX: RAMON)">
        <button class="btn btn-gold" onclick="entrar()">ACESSAR SISTEMA</button>
    </div>

    <div id="main-app">
        <div class="container">
            <div class="header">
                <div>
                    <span style="color:#666">AUTENTICADO:</span> 
                    <span id="display-name" style="color:var(--gold); font-weight:bold;">---</span>
                </div>
                <button onclick="location.reload()" style="background:none; border:1px solid #444; color:#444; padding:5px 10px; cursor:pointer; border-radius:4px;">LOGOUT</button>
            </div>

            <div class="grid">
                <div class="card" style="border-left: 5px solid var(--gold);">
                    <h3>Carteira Virtual</h3>
                    <div class="stats"><span id="coin-count">0.00</span> <small style="font-size:14px; color:#444">SC</small></div>
                    <div class="input-group">
                        <label>Adicionar Saldo</label>
                        <select id="bonus-val">
                            <option value="1">Salário (+1.00 SC)</option>
                            <option value="10">Bônus (+10.00 SC)</option>
                            <option value="50">Prêmio (+50.00 SC)</option>
                        </select>
                    </div>
                    <button class="btn btn-gold" onclick="processarAcao('moedas', 'bonus-val', 'Adição de Saldo')">Confirmar Recebimento</button>
                </div>

                <div class="card" style="border-left: 5px solid var(--red);">
                    <h3>Central de Multas</h3>
                    <div class="input-group">
                        <label>Motivo da Punição</label>
                        <input type="text" id="punish-reason" placeholder="Ex: Erro em patrulha">
                    </div>
                    <div class="input-group">
                        <label>Valor da Multa</label>
                        <select id="punish-val">
                            <option value="-5">Leve (-5.00 SC)</option>
                            <option value="-20">Grave (-20.00 SC)</option>
                            <option value="-50">Gravíssima (-50.00 SC)</option>
                        </select>
                    </div>
                    <button class="btn btn-red" onclick="processarAcao('moedas', 'punish-val', 'Punição Aplicada')">Aplicar Multa</button>
                </div>
            </div>

            <div class="card" style="margin-top:20px; border-left: 5px solid var(--blue);">
                <h3>Registro de Trabalho</h3>
                <div style="display:flex; justify-content: space-around; align-items: center;">
                    <div class="stats" style="color:var(--blue)">LOGS: <span id="log-count" style="color:#fff">0</span></div>
                    <button class="btn btn-blue" style="width:200px" onclick="processarAcao('logs', null, 'Log de Atividade')">Registrar Atividade</button>
                </div>
            </div>

            <div class="log-box" id="history">
                <div style="color:#333; text-align:center; margin-top:80px;">SISTEMA PRONTO PARA REGISTRO</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, increment, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBT61_LDGahjUVL7wSuQ0m960QLgTvcFus",
          authDomain: "painel-onestate.firebaseapp.com",
          projectId: "painel-onestate",
          storageBucket: "painel-onestate.firebasestorage.app",
          messagingSenderId: "943105366215",
          appId: "1:943105366215:web:2b024ad3df731f2bff06e2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.entrar = async () => {
            const nome = document.getElementById('user-login').value.trim().toUpperCase();
            if(!nome) return alert("INSIRA SEU NOME DE ADM");
            
            window.usuarioAtual = nome;
            const userRef = doc(db, "usuarios", nome);
            const userSnap = await getDoc(userRef);

            if (!userSnap.exists()) {
                await setDoc(userRef, { moedas: 0, logs: 0 });
            }

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('display-name').innerText = nome;

            onSnapshot(userRef, (docSnap) => {
                if (docSnap.exists()) {
                    document.getElementById('coin-count').innerText = docSnap.data().moedas.toFixed(2);
                    document.getElementById('log-count').innerText = docSnap.data().logs || 0;
                }
            });
        };

        window.processarAcao = async (campo, inputId, tipo) => {
            const userRef = doc(db, "usuarios", window.usuarioAtual);
            let valor = 1; // Default para logs
            let motivo = "";

            if(inputId) {
                valor = parseFloat(document.getElementById(inputId).value);
                if(tipo === 'Punição Aplicada') {
                    motivo = " - " + (document.getElementById('punish-reason').value || "Sem motivo");
                }
            }

            try {
                await updateDoc(userRef, { [campo]: increment(valor) });
                
                const history = document.getElementById('history');
                if(history.innerText.includes("PRONTO")) history.innerHTML = "";
                
                const div = document.createElement('div');
                div.className = "log-entry";
                div.innerHTML = `<span>[${new Date().toLocaleTimeString()}] ${tipo}${motivo}</span> <span style="color:var(--gold)">${valor > 0 ? '+'+valor : valor}</span>`;
                history.prepend(div);
                
                if(tipo === 'Punição Aplicada') document.getElementById('punish-reason').value = "";
            } catch (e) {
                alert("ERRO DE SINCRONIZAÇÃO");
            }
        };
    </script>
</body>
</html>
