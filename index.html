<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel OneState - ADM-EL MACHO</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Suas credenciais integradas
        const firebaseConfig = {
            apiKey: "AIzaSyBT61_LDGahjUVL7wSuQOm960QLgTvcFus",
            authDomain: "painel-onestate.firebaseapp.com",
            projectId: "painel-onestate",
            storageBucket: "painel-onestate.firebasestorage.app",
            messagingSenderId: "943105366215",
            appId: "1:943105366215:web:2b024ad3df731f2bff06e2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // FUNÇÕES GLOBAIS DE ACESSO
        window.autenticar = async function() {
            const u = document.getElementById('user-login').value.toUpperCase();
            const p = document.getElementById('user-pass').value;

            if (u === "ELMACHO" && p === "123") {
                entrarNoPainel(u);
                return;
            }

            const docRef = doc(db, "usuarios", u);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists() && docSnap.data().senha === p) {
                entrarNoPainel(u);
            } else {
                alert("Acesso Negado! Verifique login e senha.");
            }
        };

        window.criarUsuario = async function() {
            const u = document.getElementById('new-user').value.toUpperCase();
            const p = document.getElementById('new-pass').value;
            if(!u || !p) { alert("Preencha tudo!"); return; }

            await setDoc(doc(db, "usuarios", u), { login: u, senha: p });
            alert("ADM Criado na Nuvem!");
            document.getElementById('new-user').value = "";
            document.getElementById('new-pass').value = "";
            listarUsuarios();
        };

        window.listarUsuarios = async function() {
            const querySnapshot = await getDocs(collection(db, "usuarios"));
            let html = "";
            querySnapshot.forEach((doc) => {
                html += `<div style="margin-bottom:5px;">👤 ${doc.id} <span onclick="removerUsuario('${doc.id}')" style="color:red;cursor:pointer;float:right;font-weight:bold;">[X]</span></div>`;
            });
            document.getElementById('display-users').innerHTML = html || "Nenhum ADM cadastrado.";
        };

        window.removerUsuario = async function(id) {
            if(confirm("Remover acesso de " + id + "?")) {
                await deleteDoc(doc(db, "usuarios", id));
                listarUsuarios();
            }
        };

        function entrarNoPainel(usuario) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('cargo-label').innerText = `| Online: ${usuario}`;
            document.getElementById('admin-panel-box').style.display = (usuario === "ELMACHO") ? "block" : "none";
            renderizarEscala();
            if(usuario === "ELMACHO") listarUsuarios();
        }
    </script>

    <style>
        :root { --gold: #f1c40f; --dark: #0a0a0a; --glass: rgba(15, 15, 15, 0.95); --red: #e74c3c; --green: #2ecc71; --blue: #3498db; --yellow: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark) url('http://googleusercontent.com/image_collection/image_retrieval/11042365248659034183_0') no-repeat center center fixed; background-size: cover; color: white; margin: 0; display: flex; justify-content: center; padding: 20px; }
        #login-screen { background: var(--glass); padding: 40px; border-radius: 20px; text-align: center; border: 1px solid var(--gold); width: 350px; margin-top: 10vh; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        #main-app { display: none; width: 100%; max-width: 1100px; }
        .container { background: rgba(10, 10, 10, 0.92); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(12px); margin-bottom: 20px; }
        .coin-widget { background: linear-gradient(135deg, rgba(241, 196, 15, 0.15), rgba(0,0,0,0.8)); border: 2px solid var(--gold); padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #333; background: rgba(0,0,0,0.6); color: white; margin-bottom: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-gold { background: var(--gold); color: black; }
        .grid { display: grid; grid-template-columns: 1fr 320px; gap: 20px; }
        .card { padding: 15px; border-radius: 12px; margin-top: 10px; border-left: 8px solid #555; background: rgba(255,255,255,0.05); }
        .card-mute { border-left-color: var(--green); }
        .card-prisao { border-left-color: var(--blue); }
        .card-ban-perm { border-left-color: var(--red); }
        .staff-box { background: rgba(255, 255, 255, 0.05); border: 1px solid #444; padding: 15px; border-radius: 12px; }
        .turno-item { padding: 8px; border-bottom: 1px solid #222; font-size: 12px; display: flex; justify-content: space-between; }
        .turno-atual { background: rgba(241, 196, 15, 0.2); border-left: 3px solid var(--gold); font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2 style="color:var(--gold)">SISTEMA EL MACHO</h2>
        <input type="text" id="user-login" placeholder="Usuário">
        <input type="password" id="user-pass" placeholder="Senha">
        <button class="btn btn-gold" onclick="autenticar()">Acessar</button>
    </div>

    <div id="main-app">
        <div class="coin-widget">
            <div style="font-size: 11px; color: #aaa;">SALDO EM TEMPO REAL</div>
            <div style="font-size: 28px; color: var(--gold); font-weight: bold;"><span id="coin-count">0.00</span> <small>STATE COINS</small></div>
            <div id="timer-display" style="font-family: monospace; font-size: 16px;">00:00:00</div>
            <div style="margin-top:10px;">
                <button id="btn-ponto" class="btn" style="width:140px; background:var(--blue); color:white; font-size:11px;" onclick="togglePonto()">INICIAR TURNO</button>
                <button class="btn" style="width:140px; background:var(--red); color:white; font-size:11px;" onclick="resetarPonto()">RESETAR</button>
            </div>
        </div>

        <div class="container">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 style="color:var(--gold); margin:0;">ADM-EL MACHO <small id="cargo-label" style="color:white; font-size:12px;"></small></h2>
                <button onclick="location.reload()" style="background:none; border:none; color:var(--red); cursor:pointer; font-weight:bold;">SAIR</button>
            </div>

            <div class="grid">
                <div>
                    <input id="busca" oninput="buscar()" placeholder="Buscar Regra (Ex: NAME1, RP1)...">
                    <div id="resultado"></div>

                    <div class="container" style="margin-top:20px; background:rgba(255,255,255,0.02);">
                        <select id="log-servidor">
                            <option value="" disabled selected>Selecione o Servidor (27)</option>
                            <option value="Madera-Br">Madera-Br</option><option value="Alameda-Br">Alameda-Br</option>
                            <option value="Lynwood-Br">Lynwood-Br</option><option value="Malibu-Br">Malibu-Br</option>
                            <option value="Bell-Br">Bell-Br</option><option value="Lomita-Br">Lomita-Br</option>
                            <option value="Glendale-Br">Glendale-Br</option><option value="Laguna-Br">Laguna-Br</option>
                            <option value="Santa Cruz-Br">Santa Cruz-Br</option><option value="Redland-Br">Redland-Br</option>
                            <option value="Dixon-Br">Dixon-Br</option><option value="Homeland-Br">Homeland-Br</option>
                            <option value="Hills-Br">Hills-Br</option><option value="Fortuna-Br">Fortuna-Br</option>
                            <option value="Covina-Br">Covina-Br</option><option value="Chico-Br">Chico-Br</option>
                            <option value="Orange-Br">Orange-Br</option><option value="Yuba-Br">Yuba-Br</option>
                            <option value="Lincoln-Br">Lincoln-Br</option><option value="Pablo-Br">Pablo-Br</option>
                            <option value="Forest-Br">Forest-Br</option><option value="Napa-Br">Napa-Br</option>
                            <option value="Solano-Br">Solano-Br</option><option value="Barry-Br">Barry-Br</option>
                            <option value="Hemet-Br">Hemet-Br</option><option value="Wasco-Br">Wasco-Br</option>
                            <option value="Mesa-Br">Mesa-Br</option>
                        </select>
                        <input type="text" id="log-nome" placeholder="Nome do Jogador">
                        <input type="text" id="log-regra" placeholder="Código da Regra">
                        <input type="text" id="log-tempo" placeholder="Tempo">
                        <input type="text" id="log-motivo" placeholder="Motivo">
                        <input type="text" id="log-evidencia" placeholder="Link da Evidência">
                        <button class="btn btn-gold" onclick="copiarLog()">Copiar Log Completa</button>
                    </div>
                </div>

                <div>
                    <div id="admin-panel-box" class="staff-box" style="display:none;">
                        <h4 style="margin:0 0 10px 0; color:var(--gold); font-size:12px;">👥 GESTÃO DE STAFF (NUVEM)</h4>
                        <input type="text" id="new-user" placeholder="Login do ADM" style="padding:5px;">
                        <input type="text" id="new-pass" placeholder="Senha" style="padding:5px;">
                        <button class="btn btn-gold" style="padding:5px; font-size:10px;" onclick="criarUsuario()">Salvar no Banco</button>
                        <div id="display-users" class="user-list" style="margin-top:10px; font-size:11px;"></div>
                    </div>

                    <div class="staff-box" style="margin-top:20px;">
                        <h4 style="margin:0 0 10px 0; color:var(--gold); font-size:12px;">📅 ESCALA</h4>
                        <div id="lista-turnos"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="teste.js"></script>
    <script>
        let tempoSegundos = 0, timerAtivo = false, intervalo;

        function togglePonto() {
            const btn = document.getElementById('btn-ponto');
            if(!timerAtivo) {
                timerAtivo = true; btn.innerText = "PAUSAR"; btn.style.background = "#e74c3c";
                intervalo = setInterval(() => { tempoSegundos++; atualizarDisplay(); }, 1000);
            } else {
                timerAtivo = false; btn.innerText = "RETOMAR"; btn.style.background = "#3498db";
                clearInterval(intervalo);
            }
        }

        function resetarPonto() {
            clearInterval(intervalo); tempoSegundos = 0; timerAtivo = false;
            document.getElementById('btn-ponto').innerText = "INICIAR TURNO";
            document.getElementById('btn-ponto').style.background = "#3498db";
            atualizarDisplay();
        }

        function atualizarDisplay() {
            const h = Math.floor(tempoSegundos / 3600).toString().padStart(2, '0');
            const m = Math.floor((tempoSegundos % 3600) / 60).toString().padStart(2, '0');
            const s = (tempoSegundos % 60).toString().padStart(2, '0');
            document.getElementById('timer-display').innerText = `${h}:${m}:${s}`;
            document.getElementById('coin-count').innerText = (tempoSegundos * (20 / 3600)).toFixed(2);
        }

        function renderizarEscala() {
            const horaAtual = new Date().getHours();
            const turnos = ["00:00-03:00","03:00-06:00","06:00-09:00","09:00-12:00","12:00-15:00","15:00-18:00","18:00-21:00","21:00-00:00"];
            document.getElementById('lista-turnos').innerHTML = turnos.map(t => {
                const inicio = parseInt(t.split(':')[0]);
                const ativo = horaAtual >= inicio && horaAtual < inicio + 3;
                return `<div class="turno-item ${ativo ? 'turno-atual' : ''}"><span>${t}</span><span>${ativo ? '●' : ''}</span></div>`;
            }).join('');
        }

        function buscar() {
            const t = document.getElementById('busca').value.toUpperCase();
            const res = document.getElementById('resultado');
            if(!t || typeof regras === 'undefined') { res.innerHTML = ""; return; }
            const r = regras.find(i => i.codigo === t || (i.nome && i.nome.toUpperCase().includes(t)));
            if(r) {
                res.innerHTML = `<div class="card"><strong>${r.nome}</strong> [${r.codigo}]<br><small>${r.punicao} | ${r.tempo}</small></div>`;
                document.getElementById('log-regra').value = r.codigo; 
                document.getElementById('log-tempo').value = r.tempo; 
                document.getElementById('log-motivo').value = r.nome;
            }
        }

        function copiarLog() {
            const nome = document.getElementById('log-nome').value, serv = document.getElementById('log-servidor').value, 
                  regra = document.getElementById('log-regra').value, tempo = document.getElementById('log-tempo').value, 
                  motivo = document.getElementById('log-motivo').value, evi = document.getElementById('log-evidencia').value;
            if(!serv) { alert("Selecione o Servidor!"); return; }
            let texto = `PRISÃO\nNOME: ${nome}\nSERVIDOR: ${serv}\nREGRA: ${regra}\nMOTIVO: ${motivo}\nTEMPO: ${tempo}\n\nAPLICAR E FAZER LOG\n\nEVIDÊNCIA: ${evi}`;
            navigator.clipboard.writeText(texto); alert("Log Copiada!");
        }
    </script>
</body>
</html>
