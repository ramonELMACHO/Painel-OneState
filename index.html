<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel OneState - EL MACHO TECH</title>
    <style>
        :root { 
            --gold: #f1c40f; 
            --dark: #0a0a0a; 
            --glass: rgba(15, 15, 15, 0.95); 
        }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--dark); 
            color: white; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
        }
        #login-screen { 
            background: var(--glass); 
            padding: 40px; 
            border-radius: 20px; 
            text-align: center; 
            border: 1px solid var(--gold); 
            width: 350px; 
            margin-top: 10vh; 
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.2);
        }
        #main-app { 
            display: none; 
            width: 100%; 
            max-width: 1100px; 
        }
        .coin-widget { 
            background: linear-gradient(135deg, rgba(241, 196, 15, 0.15), rgba(0,0,0,0.8)); 
            border: 2px solid var(--gold); 
            padding: 25px; 
            border-radius: 15px; 
            text-align: center; 
            margin-bottom: 20px; 
        }
        .coin-amount { 
            font-size: 48px; 
            color: var(--gold); 
            font-weight: bold; 
            margin: 10px 0;
        }
        input { 
            width: 100%; 
            padding: 12px; 
            border-radius: 8px; 
            border: 2px solid #333; 
            background: rgba(0,0,0,0.6); 
            color: white; 
            margin-bottom: 15px; 
            box-sizing: border-box; 
        }
        .btn { 
            width: 100%; 
            padding: 15px; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase; 
            transition: 0.3s;
        }
        .btn-gold { 
            background: var(--gold); 
            color: black; 
        }
        .btn-gold:hover {
            background: #d4ac0d;
            transform: scale(1.02);
        }
        .status-cloud {
            font-size: 12px;
            color: #2ecc71;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2 style="color:var(--gold); margin-bottom: 5px;">SISTEMA EL MACHO</h2>
        <div class="status-cloud">● NUVEM ATIVA</div>
        <p style="font-size: 14px; color: #888;">Digite seu nome de ADM para entrar</p>
        <input type="text" id="user-login" placeholder="Ex: Ramon_ADM">
        <button class="btn btn-gold" onclick="entrar()">Acessar Painel</button>
    </div>

    <div id="main-app">
        <div class="coin-widget">
            <div id="user-welcome" style="font-size: 18px; letter-spacing: 1px;">BEM-VINDO</div>
            <div class="coin-amount"><span id="coin-count">0.00</span> <small style="font-size: 20px;">SC</small></div>
            <p style="color: #888;">State Coins em tempo real</p>
            <button class="btn btn-gold" style="width:250px;" onclick="adicionarMoeda()">+1.00 State Coin</button>
        </div>
        
        <div style="text-align: center;">
            <button class="btn" style="background: #222; color: #888; width: 150px;" onclick="location.reload()">Sair do Sistema</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, increment, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // CONFIGURAÇÃO VINDA DO SEU CONSOLE FIREBASE
        const firebaseConfig = {
          apiKey: "AIzaSyBT61_LDGahjUVL7wSuQ0m960QLgTvcFus",
          authDomain: "painel-onestate.firebaseapp.com",
          projectId: "painel-onestate",
          storageBucket: "painel-onestate.firebasestorage.app",
          messagingSenderId: "943105366215",
          appId: "1:943105366215:web:2b024ad3df731f2bff06e2"
        };

        // INICIALIZANDO O BANCO
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // FUNÇÃO PARA ENTRAR
        window.entrar = async () => {
            const nome = document.getElementById('user-login').value.trim().toUpperCase();
            if(!nome) return alert("Por favor, digite seu nome!");
            
            window.usuarioAtual = nome;
            const userRef = doc(db, "usuarios", nome);
            const userSnap = await getDoc(userRef);

            // SE O USUÁRIO NÃO EXISTIR NO BANCO, CRIA UM NOVO
            if (!userSnap.exists()) {
                await setDoc(userRef, { moedas: 0, cargo: "ADM" });
            }

            // TROCA DE TELA
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('user-welcome').innerText = "ADM: " + nome;

            // FICA "OUVINDO" O BANCO EM TEMPO REAL
            onSnapshot(userRef, (doc) => {
                if (doc.exists()) {
                    document.getElementById('coin-count').innerText = doc.data().moedas.toFixed(2);
                }
            });
        };

        // FUNÇÃO PARA ADICIONAR MOEDA NO GOOGLE
        window.adicionarMoeda = async () => {
            const userRef = doc(db, "usuarios", window.usuarioAtual);
            try {
                await updateDoc(userRef, { 
                    moedas: increment(1) 
                });
            } catch (e) {
                console.error("Erro ao salvar:", e);
            }
        };
    </script>
</body>
</html>
